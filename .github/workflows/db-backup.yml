# .github/workflows/db-backup.yml
# Daily Postgres 18 backup → uploaded as a GitHub Release artifact.

name: db-backup

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install Postgres 18 client (PGDG repo)
        run: |
          set -euo pipefail
          
          # Modern signed-by method (apt-key is deprecated in Ubuntu 24)
          sudo install -d /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /etc/apt/keyrings/pgdg.asc > /dev/null
          
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt ${CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          
          sudo apt-get update
          
          # Remove the preinstalled pg16 client to avoid version conflicts
          sudo apt-get remove -y postgresql-client-16 postgresql-client-common || true
          
          # Install pg18 client + verify
          sudo apt-get install -y postgresql-client-18
          
          INSTALLED_VERSION=$(pg_dump --version | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "→ pg_dump version installed: $INSTALLED_VERSION"
          
          if [[ ! "$INSTALLED_VERSION" =~ ^18\. ]]; then
            echo "❌ Expected pg_dump 18.x but got $INSTALLED_VERSION"
            echo "   Server is Postgres 18.3, client must be >= server version."
            exit 1
          fi
          
          echo "✓ pg_dump 18.x ready"

      - name: Generate dump
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          set -euo pipefail
          
          if [ -z "${DATABASE_PUBLIC_URL:-}" ]; then
            echo "❌ DATABASE_PUBLIC_URL secret not set in repo settings"
            exit 1
          fi
          
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          DUMPFILE="techkb-${TIMESTAMP}.dump"
          echo "DUMPFILE=$DUMPFILE" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          
          echo "→ Connecting to Postgres and generating dump..."
          pg_dump "$DATABASE_PUBLIC_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="$DUMPFILE"
          
          echo "✓ Dump generated:"
          ls -lh "$DUMPFILE"

      - name: Upload as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: backup-${{ env.TIMESTAMP }}
          name: "DB Backup ${{ env.TIMESTAMP }}"
          body: |
            Automated daily Postgres 18 backup from Railway.
            
            **Restore:**
pg_restore --no-owner --no-privileges -d $TARGET_DB techkb-*.dump
files: ${{ env.DUMPFILE }}
          make_latest: false
          prerelease: true
