services:
  postgres:
    image: postgres:16-alpine
    container_name: techfix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techfix
      LANG: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - techfix_pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techfix"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  techfix_pgdata:
    name: techfix_pgdata
